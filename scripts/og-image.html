<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #1C1917;
    font-family: Georgia, 'Times New Roman', serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px;
    position: relative;
    overflow: hidden;
  }
  .glow {
    position: absolute;
    top: 80px;
    left: -60px;
    width: 420px;
    height: 420px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(212,168,83,0.1) 0%, transparent 70%);
  }
  .glow2 {
    position: absolute;
    bottom: 60px;
    right: -40px;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(184,115,51,0.07) 0%, transparent 70%);
  }
  .label {
    font-family: -apple-system, sans-serif;
    font-size: 15px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #D4A853;
    margin-bottom: 28px;
    position: relative;
  }
  .heading {
    font-size: 76px;
    font-weight: 700;
    line-height: 0.93;
    color: #F5F0E8;
    position: relative;
  }
  .heading .gold {
    color: #D4A853;
  }
  .sub {
    font-family: -apple-system, sans-serif;
    font-size: 21px;
    color: #D6D0C4;
    margin-top: 36px;
    max-width: 680px;
    line-height: 1.55;
    position: relative;
  }
  .bottom {
    position: absolute;
    bottom: 56px;
    left: 80px;
    right: 80px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .url {
    font-family: -apple-system, sans-serif;
    font-size: 16px;
    color: #57534E;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #D4A853;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="glow2"></div>
  <div class="label">Wildash Enterprises</div>
  <div class="heading">
    AI for the<br><span class="gold">rest of us.</span>
  </div>
  <div class="sub">AI consulting &amp; training for small business owners.<br>Less cognitive load, more leverage.</div>
  <div class="bottom">
    <span class="url">wildashenterprises.com</span>
    <span class="dot"></span>
  </div>
</body>
</html>
